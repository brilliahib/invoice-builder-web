openapi: "3.1.0"
info:
  title: Invoice Builder — Invoices API
  version: "0.1.0"
  description: |
    CRUD endpoints for invoices. All endpoints are company-scoped.
    Scope is determined by the authenticated user's company.

paths:
  /api/invoices:
    get:
      summary: List invoices for the current company
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [DRAFT, PUBLISHED]
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Paginated list of invoices
    post:
      summary: Create a new invoice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceCreateInput"
      responses:
        "201":
          description: Invoice created

  /api/invoices/{id}:
    get:
      summary: Get invoice by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice detail
        "404":
          description: Not found
    put:
      summary: Update invoice by ID
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Invoice updated
    delete:
      summary: Delete invoice by ID
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Invoice deleted

  /api/invoices/{id}/pdf:
    get:
      summary: Export invoice as PDF
      security:
        - bearerAuth: []
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    InvoiceCreateInput:
      type: object
      properties:
        invoice_number:
          type: string
        status:
          type: string
          enum: [DRAFT, PUBLISHED]
        due_date:
          type: string
          format: date
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/LineItem"
    LineItem:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: number
        unit_price:
          type: number
